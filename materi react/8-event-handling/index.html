<html>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const container = document.getElementById("root");
      const root = ReactDOM.createRoot(container);

      function Header({ author }) {
        return <h1>Belajar React bareng {author ? author : "WPU"} 🚀</h1>;
      }

      function HomePage() {
        //nilai state,function untuk mengubah nilai
        //nama function bebas
        //nilai awal isi di usestate
        //menjalankan function di function lain di komponen kita untuk hooks
        //hooks mengelola state yaitu function setState pada komponen kita mengembalikan array
        const [likes, setLikes] = React.useState(0);

        function handleClick() {
          setLikes(likes + 1);
        }

        return (
          <div>
            <Header />
            <button onClick={handleClick}>Like ({likes})</button>
          </div>
        );
      }

      root.render(<HomePage />);
    </script>
  </body>
</html>
