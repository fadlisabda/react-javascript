<html>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const container = document.getElementById("root");
      const root = ReactDOM.createRoot(container);

      function HomePage() {
        //nilai state,function untuk mengubah nilai
        //nama function bebas
        //nilai awal isi di usestate
        //menjalankan function di function lain di komponen kita untuk hooks
        //hooks mengelola state yaitu function setState pada komponen kita mengembalikan array

        // *use state file products.jsx
        const [cart, setCart] = React.useState({
          id: 1,
          qty: 1,
        });
        function handleAddToCart(id) {
          if (cart.find((item) => item.id === id)) {
            setCart(cart.map((item) => (item.id === id ? { ...item, qty: item.qty + 1 } : item)));
          } else {
            setCart([...cart, { id, qty: 1 }]);
          }
        }
        // <CardProduct.Footer handleAddToCart={handleAddToCart} id=product.id></CardProduct.Footer>
      }

      // *use state file CardProduct.jsx footer
      <Button onClick={() => handleAddToCart(id)}>Add To Cart</Button>;

      root.render(<HomePage />);
    </script>
  </body>
</html>
